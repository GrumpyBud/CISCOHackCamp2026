[env:fullos-badge]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
  bodmer/TFT_eSPI
build_flags =
  -D USER_SETUP_LOADED
  -D ST7735_DRIVER
  -D TFT_WIDTH=128
  -D TFT_HEIGHT=128
  -D ST7735_GREENTAB
  -D TFT_RGB_ORDER=TFT_BGR
  -D TFT_MOSI=23
  -D TFT_SCLK=18
  -D TFT_CS=19
  -D TFT_DC=26
  -D TFT_RST=25
  -D TFT_BL=5
  -D TFT_BACKLIGHT_ON=HIGH
  -D SPI_FREQUENCY=27000000
  -D LOAD_GLCD
  -D LOAD_FONT2
  -D LOAD_FONT4
